# Better prefix key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# More intuitive splits
bind s split-window -h
bind v split-window -v

# Show pane numbers
bind i display-panes

# vim keys for pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Subtle active pane emphasis
set -g window-style 'fg=colour250'
set -g window-active-style 'fg=colour255'
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour39'
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[fg=colour39] ● #[default],#[fg=colour238] ○ #[default]}'
